spring:
  application:
    name: restaurant-manager-api-v2

  datasource:
    url: jdbc:postgresql://localhost:5433/restaurant_manager_v2
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
api:
  security:
    token:
      secret: ${JWT_SECRET:minha-chave-secreta-temporaria-mudar-em-producao}